<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVerse</title>
</head>

<body>
    <header>
        <h1>🎬 MovieVerse</h1>
        <p>Discover movies, ratings, cast, and more in seconds.</p>
    </header>
    <section class="search-section">

        <input type="text" id="search-input" placeholder="Search a movie...">

        <button id="search-btn">
            Search
        </button>

    </section>
    <div class="contents">
        <h2>Search Results</h2>
        <div class="movie-container" id="movie-container">
            <div class="movie-poster">

            </div>
            <div class="movie-details">

            </div>
            <div class="buttons">

                <button>
                    IMDb
                </button>

                <button>
                    ❤ Favorite
                </button>

            </div>
        </div>
        <div class="similarmovies" id="similar-movie-list">


        </div>
        <footer>

            Made with ❤️ by Ayush Raj

        </footer>
</body>

</html>
